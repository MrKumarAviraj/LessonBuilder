<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5E Auto-Grader Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .drop-zone {
            background: white;
            border: 4px dashed rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: white;
            background: rgba(255,255,255,0.1);
            transform: scale(1.02);
        }
        .drop-zone-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .drop-zone h2 {
            color: white;
            margin-bottom: 10px;
        }
        .drop-zone p {
            color: rgba(255,255,255,0.8);
        }
        .file-input {
            display: none;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            flex: 1;
            min-width: 200px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        .student-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .student-card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .student-name {
            font-size: 1.3em;
            font-weight: 600;
        }
        .submission-time {
            font-size: 0.85em;
            opacity: 0.9;
        }
        .card-body {
            padding: 20px;
        }
        .response-section {
            margin-bottom: 20px;
        }
        .response-section:last-child {
            margin-bottom: 0;
        }
        .response-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .response-content {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            color: #333;
        }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            aspect-ratio: 16/10;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .clear-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background: white;
            color: #667eea;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .students-grid {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 5E Auto-Grader Dashboard</h1>
            <p>Drag & drop student JSON submissions to review</p>
        </header>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📁</div>
            <h2>Drop Student JSON Files Here</h2>
            <p>or click to browse • Supports multiple files</p>
            <input type="file" class="file-input" id="fileInput" accept=".json" multiple>
        </div>

        <div id="dashboardContent" style="display: none;">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-number" id="totalSubmissions">0</div>
                    <div class="stat-label">Total Submissions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="withImages">0</div>
                    <div class="stat-label">With Screenshots</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avgImages">0</div>
                    <div class="stat-label">Avg Images/Submission</div>
                </div>
            </div>

            <div class="actions">
                <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
            </div>

            <div class="students-grid" id="studentsGrid"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📭</div>
            <h2>No submissions yet</h2>
            <p>Drop JSON files above to start reviewing</p>
        </div>
    </div>

    <div class="modal" id="imageModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="Full size image">
    </div>

    <script>
        let submissions = [];
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const dashboardContent = document.getElementById('dashboardContent');
        const emptyState = document.getElementById('emptyState');
        const studentsGrid = document.getElementById('studentsGrid');

        // Drop zone events
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.name.endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            submissions.push({
                                filename: file.name,
                                ...data
                            });
                            renderDashboard();
                        } catch (err) {
                            alert(`Error parsing ${file.name}: Invalid JSON format`);
                        }
                    };
                    reader.readAsText(file);
                } else {
                    alert(`${file.name} is not a JSON file`);
                }
            });
        }

        function renderDashboard() {
            if (submissions.length === 0) {
                dashboardContent.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            dashboardContent.style.display = 'block';
            emptyState.style.display = 'none';

            // Update stats
            document.getElementById('totalSubmissions').textContent = submissions.length;
            const withImagesCount = submissions.filter(s => s.responses?.elaborate?.imageCount > 0).length;
            document.getElementById('withImages').textContent = withImagesCount;
            const totalImages = submissions.reduce((sum, s) => sum + (s.responses?.elaborate?.imageCount || 0), 0);
            document.getElementById('avgImages').textContent = submissions.length ? (totalImages / submissions.length).toFixed(1) : 0;

            // Render cards
            studentsGrid.innerHTML = submissions.map((submission, index) => `
                <div class="student-card">
                    <div class="card-header">
                        <div class="student-name">👤 ${escapeHtml(submission.studentName)}</div>
                        <div class="submission-time">${formatDate(submission.timestamp)}</div>
                    </div>
                    <div class="card-body">
                        <div class="response-section">
                            <div class="response-label">🔍 Explore</div>
                            <div class="response-content">${escapeHtml(submission.responses?.explore || 'No response')}</div>
                        </div>

                        <div class="response-section">
                            <div class="response-label">💡 Explain</div>
                            <div class="response-content">${escapeHtml(submission.responses?.explain || 'Not completed')}</div>
                        </div>

                        <div class="response-section">
                            <div class="response-label">📸 Elaborate (${submission.responses?.elaborate?.imageCount || 0} images)</div>
                            <div class="image-gallery">
                                ${(submission.responses?.elaborate?.images || []).map((img, i) => `
                                    <div class="gallery-item" onclick="openModal('${img}')">
                                        <img src="${img}" alt="Screenshot ${i + 1}">
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="response-section">
                            <div class="response-label">✅ Evaluate</div>
                            <div class="response-content">${escapeHtml(submission.responses?.evaluate || 'No response')}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function formatDate(isoString) {
            if (!isoString) return 'Unknown';
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function openModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all submissions?')) {
                submissions = [];
                renderDashboard();
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
